<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Passport/document shape (subtle) -->
  <rect x="140" y="80" width="232" height="310" rx="16" fill="rgba(255,255,255,0.12)"/>
  <rect x="160" y="100" width="192" height="270" rx="10" fill="rgba(255,255,255,0.08)"/>
  <!-- "W" lettermark -->
  <text x="256" y="340" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-size="280" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="central" letter-spacing="-10">W</text>
  <!-- Small camera icon at bottom -->
  <circle cx="256" cy="430" r="24" fill="rgba(255,255,255,0.25)"/>
  <circle cx="256" cy="430" r="12" fill="rgba(255,255,255,0.5)"/>
</svg>
