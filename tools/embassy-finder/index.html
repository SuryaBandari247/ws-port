// Generate fallback for missing combos
function findEmbassy() {
  var country = document.getElementById('ef-country').value;
  var dest = document.getElementById('ef-dest').value;
  if (!country || !dest) { alert('Please select both fields'); return; }
  if (country === dest) { alert('You don\'t need a visa for your own country!'); return; }

  var key = country + '-' + dest;
  var results = embassies[key];
  var container = document.getElementById('ef-results');

  if (!results || results.length === 0) {
    container.innerHTML = '<div class="tool-card"><h2>No specific data available</h2><p style="color:#64748b;margin-top:8px;">We don\'t have detailed embassy data for this combination yet. Try these resources:</p><ul style="margin-top:12px;padding-left:20px;color:#475569;font-size:14px;line-height:2;"><li><a href="https://www.vfsglobal.com/" rel="nofollow" style="color:#2563eb;">VFS Global</a> — Visa application centers worldwide</li><li><a href="https://www.tlscontact.com/" rel="nofollow" style="color:#2563eb;">TLScontact</a> — Schengen visa centers</li><li>Search: "[destination country] embassy in [your country]"</li></ul></div>';
    container.style.display = 'block';
    return;
  }

  var html = '';
  results.forEach(function(e) {
    html += '<div class="embassy-card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;">';
    html += '<h3>' + e.name + '</h3>';
    html += '<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;background:#dbeafe;color:#1d4ed8;">' + e.type + '</span>';
    html += '</div>';
    html += '<p style="margin-top:6px;">📍 ' + e.address + '</p>';
    if (e.phone) html += '<p>📞 ' + e.phone + '</p>';
    var links = '';
    if (e.web) links += '<a href="' + e.web + '" target="_blank" rel="nofollow">Website ↗</a> ';
    if (e.appt) links += '<a href="' + e.appt + '" target="_blank" rel="nofollow">Book Appointment ↗</a>';
    if (links) html += '<p style="margin-top:8px;">' + links + '</p>';
    html += '</div>';
  });

  html += '<div class="tool-card" style="text-align:center;margin-top:16px;"><p style="font-size:14px;color:#475569;margin-bottom:12px;">Need a passport photo for your visa application?</p><a href="/portrait/" class="tool-btn">Create Passport Photo →</a></div>';

  container.innerHTML = html;
  container.style.display = 'block';
  container.scrollIntoView({ behavior: 'smooth' });
}
